debug=false

file.path=/path/to/files/
file.prefix=/files/

init.system.enums=false

spring.datasource.url=jdbc:mysql://host:3306/database?relaxAutoCommit=true&zeroDateTimeBehavior=convertToNull&characterEncoding=utf-8&useSSL=false&autoReconnect=true&rewriteBatchedStatements=true
spring.datasource.username=username
spring.datasource.password=password

spring.redis.host=host
spring.redis.password=password
spring.redis.port=6379
spring.redis.database=0

aliyun.oss.AccessKeyID=your-access-key-id
aliyun.oss.AccessKeySecret=your-access-key-secret
aliyun.oss.Buckets=your-bucket
aliyun.oss.EndPoint=https://oss-cn-hangzhou.aliyuncs.com
aliyun.oss.prefix=prefix/

sys.sm4.key=change-me

api.encrypt.enable=true
api.encrypt.key=change-me
api.encrypt.whiteList=/public/

es.switch=close
es.host=host
es.port=9200
es.username=username
es.password=password
es.scheme=http
es.connect.timeout=1000
es.socket.timeout=20000
